<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لتواصلكم | Magellan</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #008fcc;
            --dark-blue: #0a192f;
            --bg-light: #f8fbff;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .thank-you-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }
        .success-icon {
            font-size: 80px;
            color: #25d366;
            margin-bottom: 20px;
        }
        h1 { color: var(--dark-blue); font-weight: 900; margin-bottom: 15px; }
        p { color: #64748b; font-size: 1.1rem; margin-bottom: 30px; }
        .btn-home {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,143,204,0.2);
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>تم الإرسال بنجاح!</h1>
        <p>شكراً لتواصلك مع <strong>ماجلان للحلول الرقمية</strong>. لقد استلمنا رسالتك وسيقوم أحد خبراء فريقنا بالرد عليك في أقرب وقت ممكن.</p>
        <a href="index.html" class="btn-home">العودة للرئيسية</a>
    </div>

</body>
</html>
